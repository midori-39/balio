
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  #gameWrap {
    font-family: 'Press Start 2P', monospace;
    background: #5C94FC;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0 0; min-height: 420px; user-select: none;
  }
  #hud { display: flex; justify-content: space-between; width: 640px; color: #fff; font-size: 9px; margin-bottom: 8px; padding: 0 8px; }
  #gameCanvas { border: 3px solid #000; display: block; image-rendering: pixelated; }
  #overlay {
    position: absolute; top:0; left:0; right:0; bottom:0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); color: #fff;
    font-family: 'Press Start 2P', monospace; z-index: 10; border-radius: 4px;
  }
  #overlay h2 { font-size: 18px; margin-bottom: 16px; color: #FFD700; text-shadow: 2px 2px #c00; }
  #overlay p { font-size: 9px; line-height: 1.8; text-align: center; }
  #startBtn { margin-top: 18px; background: #e83000; color: #fff; border: 3px solid #fff; font-family: 'Press Start 2P', monospace; font-size: 10px; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
  #canvasWrap { position: relative; }
  #controls { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
  .ctrl-btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); color: #fff; font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 10px 14px; border-radius: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .ctrl-btn:active { background: rgba(255,255,255,0.35); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<div id="gameWrap">
  <div id="hud">
    <span>スコア: <span id="scoreDisp">0</span></span>
    <span>コイン: <span id="coinDisp">0</span> 🪙</span>
    <span>残機: <span id="livesDisp">3</span></span>
    <span id="sizeDisp">ワールド 1-1</span>
  </div>
  <div id="canvasWrap">
    <canvas id="gameCanvas" width="640" height="320"></canvas>
    <div id="overlay">
      <h2>SUPER MARIO</h2>
      <p>← → で移動<br>↑ / Zキー でジャンプ<br>クリボーを踏んでやっつけよう！<br>？ブロックを叩いてコインをゲット！<br>3枚目のコインできのこが出現！</p>
      <button id="startBtn">▶ スタート！</button>
    </div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btnLeft">◀</button>
    <button class="ctrl-btn" id="btnJump">▲ ジャンプ</button>
    <button class="ctrl-btn" id="btnRight">▶</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W=640, H=320, TILE=32;
const GRAVITY=0.5, JUMP=-11, SPEED=3;
const GROUND_Y = H - TILE;

let score=0, coins=0, lives=3, running=false, cameraX=0;
// きのこ出現フラグ
let mushroomSpawned=false, mushroom=null;
// マリオのサイズ状態
let bigMario=false;

const keys={}, touchKeys={left:false,right:false,jump:false};
document.addEventListener('keydown',e=>{keys[e.key]=true;if([' ','z','Z','ArrowUp'].includes(e.key)&&running)e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
function btnHold(id,k){const b=document.getElementById(id);b.addEventListener('pointerdown',()=>touchKeys[k]=true);b.addEventListener('pointerup',()=>touchKeys[k]=false);b.addEventListener('pointerleave',()=>touchKeys[k]=false);}
btnHold('btnLeft','left');btnHold('btnRight','right');btnHold('btnJump','jump');
const isLeft=()=>keys['ArrowLeft']||touchKeys.left;
const isRight=()=>keys['ArrowRight']||touchKeys.right;
const isJump=()=>keys['ArrowUp']||keys['z']||keys['Z']||keys[' ']||touchKeys.jump;

const LEVEL_W=50;

// ？ブロック：3個目(index=2)がきのこブロック、それ以外はコイン
// 高さ：中(6タイル)・高め(5タイル)・最高(4タイル)のみ
function makeQBlocks(){
  return [
    {x: 6*TILE, y:6*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
    {x:10*TILE, y:5*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
    {x:14*TILE, y:4*TILE, w:TILE,h:TILE,hit:false,isMushroom:true},  // 3個目：きのこ
    {x:20*TILE, y:5*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
    {x:24*TILE, y:4*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
    {x:30*TILE, y:6*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
    {x:35*TILE, y:5*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
    {x:40*TILE, y:4*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
    {x:44*TILE, y:5*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
    {x:47*TILE, y:6*TILE, w:TILE,h:TILE,hit:false,isMushroom:false},
  ];
}

function makePlatforms(){
  const p=[];
  for(let x=0;x<LEVEL_W;x++) p.push({x:x*TILE,y:GROUND_Y,w:TILE,h:TILE,type:'ground'});
  // 足場：中〜高め（y5〜7タイル = 160〜224px）
  [[4,7,3],[8,6,2],[13,7,3],[18,6,2],[22,7,3],[27,6,3],[32,7,2],[37,6,3],[42,7,2],[46,6,2]]
    .forEach(([gx,gy,len])=>{for(let i=0;i<len;i++)p.push({x:(gx+i)*TILE,y:gy*TILE,w:TILE,h:TILE,type:'brick'});});
  return p;
}

function makeEnemies(){
  return [
    {x:7*TILE,y:GROUND_Y-28,w:28,h:28,vx:-1,vy:0,alive:true,stomped:false,stompTimer:0},
    {x:11*TILE,y:GROUND_Y-28,w:28,h:28,vx:-1,vy:0,alive:true,stomped:false,stompTimer:0},
    {x:16*TILE,y:GROUND_Y-28,w:28,h:28,vx:-1,vy:0,alive:true,stomped:false,stompTimer:0},
    {x:23*TILE,y:GROUND_Y-28,w:28,h:28,vx:-1.2,vy:0,alive:true,stomped:false,stompTimer:0},
    {x:29*TILE,y:GROUND_Y-28,w:28,h:28,vx:-1,vy:0,alive:true,stomped:false,stompTimer:0},
    {x:36*TILE,y:GROUND_Y-28,w:28,h:28,vx:-1.2,vy:0,alive:true,stomped:false,stompTimer:0},
    {x:43*TILE,y:GROUND_Y-28,w:28,h:28,vx:-1.5,vy:0,alive:true,stomped:false,stompTimer:0},
    {x:47*TILE,y:GROUND_Y-28,w:28,h:28,vx:-1.5,vy:0,alive:true,stomped:false,stompTimer:0},
  ];
}

let platforms,qblocks,enemies,particles,coinAnims,player;

function playerH(){return bigMario?44:30;}
function playerW(){return bigMario?32:24;}
function jumpPower(){return bigMario?-12:-11;}

function initGame(){
  score=0;coins=0;cameraX=0;mushroomSpawned=false;mushroom=null;bigMario=false;
  platforms=makePlatforms();qblocks=makeQBlocks();enemies=makeEnemies();
  particles=[];coinAnims=[];
  player={x:2*TILE,y:GROUND_Y-playerH(),w:playerW(),h:playerH(),vx:0,vy:0,onGround:false,
          facingRight:true,jumpPressed:false,dead:false,deadTimer:0,invincible:0,walkFrame:0,walkTick:0,
          growing:0};
  updateHUD();
}

function updateHUD(){
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('coinDisp').textContent=coins;
  document.getElementById('livesDisp').textContent=lives;
  document.getElementById('sizeDisp').textContent=bigMario?'🍄 BIG MARIO':'ワールド 1-1';
}

function aabb(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*2.5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30,color});}
}
function spawnCoinAnim(x,y){coinAnims.push({x,y,vy:-4,life:35});}

function spawnMushroom(bx,by){
  mushroom={x:bx,y:by-TILE,w:TILE-4,h:TILE-4,vx:1.2,vy:0,emerging:true,emergeY:by-TILE,emergeStart:by,collected:false};
}

function resolvePlayerPlatforms(){
  player.onGround=false;
  for(const b of [...platforms,...qblocks]){
    if(!aabb(player,b))continue;
    const ox=Math.min(player.x+player.w,b.x+b.w)-Math.max(player.x,b.x);
    const oy=Math.min(player.y+player.h,b.y+b.h)-Math.max(player.y,b.y);
    if(ox<oy){player.x=player.x<b.x?b.x-player.w:b.x+b.w;player.vx=0;}
    else{
      if(player.y<b.y){player.y=b.y-player.h;player.vy=0;player.onGround=true;}
      else{
        player.y=b.y+b.h;
        if(player.vy<0){
          if(b.type===undefined&&!b.hit){
            b.hit=true;
            if(b.isMushroom&&!mushroomSpawned){
              mushroomSpawned=true;
              spawnMushroom(b.x,b.y);
            } else if(!b.isMushroom){
              coins++;score+=200;spawnCoinAnim(b.x+TILE/2,b.y);updateHUD();
            } else {
              // きのこブロックを2度叩いた場合は何もしない
            }
          }
          player.vy=0;
        }
      }
    }
  }
}

function updateMushroom(){
  if(!mushroom||mushroom.collected)return;
  // 出現アニメーション
  if(mushroom.emerging){
    mushroom.y-=0.8;
    if(mushroom.y<=mushroom.emergeStart-TILE){mushroom.emerging=false;}
    return;
  }
  mushroom.vy=Math.min(mushroom.vy+GRAVITY,10);
  mushroom.x+=mushroom.vx;
  mushroom.y+=mushroom.vy;
  // 地面・プラットフォームとの衝突
  for(const b of platforms){
    if(!aabb(mushroom,b))continue;
    const ox=Math.min(mushroom.x+mushroom.w,b.x+b.w)-Math.max(mushroom.x,b.x);
    const oy=Math.min(mushroom.y+mushroom.h,b.y+b.h)-Math.max(mushroom.y,b.y);
    if(ox<oy){mushroom.vx*=-1;mushroom.x+=mushroom.vx*2;}
    else if(mushroom.y<b.y){mushroom.y=b.y-mushroom.h;mushroom.vy=0;}
  }
  if(mushroom.x<0){mushroom.vx=Math.abs(mushroom.vx);}
  if(mushroom.x>LEVEL_W*TILE){mushroom.vx=-Math.abs(mushroom.vx);}
  // プレイヤーとの衝突
  if(!player.dead&&aabb(player,mushroom)){
    mushroom.collected=true;
    if(!bigMario){
      bigMario=true;
      player.growing=30;
      const oldH=player.h;
      player.h=playerH();player.w=playerW();
      player.y-=(player.h-oldH);
      player.invincible=60;
    }
    score+=1000;updateHUD();
    spawnParticles(mushroom.x+mushroom.w/2,mushroom.y+mushroom.h/2,'#e83000',12);
  }
}

function updatePlayer(){
  if(player.growing>0)player.growing--;
  if(player.dead){
    if(--player.deadTimer<=0){lives--;if(lives<=0){showOverlay('GAME OVER','もう一度チャレンジ！');running=false;return;}bigMario=false;initGame();}
    return;
  }
  if(player.invincible>0)player.invincible--;
  if(isLeft()){player.vx=-SPEED;player.facingRight=false;}
  else if(isRight()){player.vx=SPEED;player.facingRight=true;}
  else{player.vx*=0.7;if(Math.abs(player.vx)<0.2)player.vx=0;}
  if(isJump()&&player.onGround&&!player.jumpPressed){player.vy=jumpPower();player.onGround=false;}
  player.jumpPressed=isJump();
  player.vy=Math.min(player.vy+GRAVITY,12);
  player.x+=player.vx;if(player.x<0)player.x=0;
  player.y+=player.vy;
  resolvePlayerPlatforms();
  if(player.y>H+40){killPlayer();return;}
  if(player.vx!==0&&player.onGround){if(++player.walkTick>6){player.walkTick=0;player.walkFrame=(player.walkFrame+1)%3;}}
  else if(player.vx===0)player.walkFrame=0;
  cameraX=Math.max(0,Math.min(player.x+player.w/2-W/2,LEVEL_W*TILE-W));
  if(player.x>(LEVEL_W-2)*TILE){score+=5000;updateHUD();showOverlay('🎉 ゴール！',`スコア: ${score}\nコイン: ${coins}`);running=false;}
}

function killPlayer(){
  if(player.invincible>0)return;
  if(bigMario){
    // 大きい時は小さくなる
    bigMario=false;
    const oldH=player.h;
    player.h=playerH();player.w=playerW();
    player.y+=(oldH-player.h);
    player.invincible=120;
    return;
  }
  player.dead=true;player.deadTimer=90;player.vy=-8;
  spawnParticles(player.x+player.w/2,player.y+player.h/2,'#e83000',12);
}

function updateEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    if(e.stomped){if(--e.stompTimer<=0)e.alive=false;continue;}
    e.vy=(e.vy||0)+GRAVITY;e.x+=e.vx;e.y+=e.vy;
    for(const b of platforms){
      if(!aabb(e,b))continue;
      const ox=Math.min(e.x+e.w,b.x+b.w)-Math.max(e.x,b.x);
      const oy=Math.min(e.y+e.h,b.y+b.h)-Math.max(e.y,b.y);
      if(ox<oy){e.vx*=-1;e.x+=e.vx;}else if(e.y<b.y){e.y=b.y-e.h;e.vy=0;}
    }
    if(e.x<0)e.vx=Math.abs(e.vx);
    if(e.x>LEVEL_W*TILE-e.w)e.vx=-Math.abs(e.vx);
    if(!player.dead&&player.invincible===0&&aabb(player,e)){
      if(player.vy>0&&player.y+player.h-e.y<(bigMario?24:18)){
        e.stomped=true;e.stompTimer=20;player.vy=-7;score+=100;updateHUD();
        spawnParticles(e.x+e.w/2,e.y+e.h/2,'#c8a200',8);
      } else killPlayer();
    }
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;if(--p.life<=0)particles.splice(i,1);}
  for(let i=coinAnims.length-1;i>=0;i--){const c=coinAnims[i];c.y+=c.vy;c.vy+=0.3;if(--c.life<=0)coinAnims.splice(i,1);}
}

function drawBackground(){
  ctx.fillStyle='#5C94FC';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';
  [[60,40],[200,60],[350,35],[500,55],[650,42],[800,60],[1000,40],[1200,55],[1400,38]].forEach(([cx,cy])=>{const dx=cx-cameraX;if(dx>-80&&dx<W+80)drawCloud(dx,cy);});
  [[80],[250],[450],[700],[950],[1200],[1450]].forEach(([hx])=>{const dx=hx-cameraX;if(dx>-100&&dx<W+100)drawHill(dx,GROUND_Y);});
}
function drawCloud(x,y){ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.arc(x+22,y-8,22,0,Math.PI*2);ctx.arc(x+44,y,18,0,Math.PI*2);ctx.fill();}
function drawHill(x,y){ctx.fillStyle='#4caf50';ctx.beginPath();ctx.arc(x,y,50,Math.PI,0);ctx.fill();ctx.fillStyle='#388e3c';ctx.beginPath();ctx.arc(x+60,y,30,Math.PI,0);ctx.fill();}

function drawTile(x,y,type){
  const sx=x-cameraX;if(sx>W+TILE||sx<-TILE)return;
  if(type==='ground'){
    ctx.fillStyle='#c84b00';ctx.fillRect(sx,y,TILE,TILE);
    ctx.fillStyle='#e86020';ctx.fillRect(sx+1,y+1,TILE-2,14);
    ctx.strokeStyle='#8b3000';ctx.lineWidth=1;ctx.strokeRect(sx+.5,y+.5,TILE-1,TILE-1);
    ctx.beginPath();ctx.moveTo(sx,y+16);ctx.lineTo(sx+TILE,y+16);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+TILE/2,y);ctx.lineTo(sx+TILE/2,y+16);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+TILE/4,y+16);ctx.lineTo(sx+TILE/4,y+TILE);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+3*TILE/4,y+16);ctx.lineTo(sx+3*TILE/4,y+TILE);ctx.stroke();
  } else {
    ctx.fillStyle='#c84b00';ctx.fillRect(sx,y,TILE,TILE);
    ctx.fillStyle='#e86020';ctx.fillRect(sx+1,y+1,TILE-2,TILE-2);
    ctx.strokeStyle='#8b3000';ctx.lineWidth=1;ctx.strokeRect(sx+.5,y+.5,TILE-1,TILE-1);
    ctx.beginPath();ctx.moveTo(sx,y+TILE/2);ctx.lineTo(sx+TILE,y+TILE/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+TILE/2,y);ctx.lineTo(sx+TILE/2,y+TILE);ctx.stroke();
  }
}

function drawQBlock(b){
  const sx=b.x-cameraX;if(sx>W+TILE||sx<-TILE)return;
  if(b.hit){
    ctx.fillStyle='#c84b00';ctx.fillRect(sx,b.y,TILE,TILE);
    ctx.fillStyle='#a03000';ctx.fillRect(sx+2,b.y+2,TILE-4,TILE-4);
    ctx.strokeStyle='#5a1a00';ctx.lineWidth=1;ctx.strokeRect(sx+.5,b.y+.5,TILE-1,TILE-1);
  } else {
    const bob=Math.sin(Date.now()/200)*1.5;
    // きのこブロックは緑色で区別
    const baseColor=b.isMushroom?'#208020':'#f0a000';
    const lightColor=b.isMushroom?'#40cc40':'#ffd040';
    ctx.fillStyle=baseColor;ctx.fillRect(sx,b.y+bob,TILE,TILE);
    ctx.fillStyle=lightColor;ctx.fillRect(sx+2,b.y+bob+2,TILE-4,TILE-4);
    ctx.strokeStyle=b.isMushroom?'#104010':'#8b5000';ctx.lineWidth=1.5;ctx.strokeRect(sx+.5,b.y+bob+.5,TILE-1,TILE-1);
    ctx.fillStyle=b.isMushroom?'#104010':'#8b5000';
    ctx.font='bold 18px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.isMushroom?'♦':'?',sx+TILE/2,b.y+bob+TILE/2+1);
  }
}

function drawMushroom(){
  if(!mushroom||mushroom.collected)return;
  const sx=mushroom.x-cameraX;
  if(sx>W+40||sx<-40)return;
  const my=mushroom.y;
  // 茎
  ctx.fillStyle='#ffd0a0';ctx.fillRect(sx+6,my+14,mushroom.w-12,mushroom.h-14);
  // 傘（赤）
  ctx.fillStyle='#e83000';
  ctx.beginPath();ctx.arc(sx+mushroom.w/2,my+14,mushroom.w/2,Math.PI,0);ctx.fill();
  // 白い水玉
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(sx+mushroom.w/2-6,my+8,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+mushroom.w/2+7,my+10,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+mushroom.w/2,my+4,3,0,Math.PI*2);ctx.fill();
  // 目
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(sx+mushroom.w/2-3,my+15,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+mushroom.w/2+5,my+15,2,0,Math.PI*2);ctx.fill();
}

function drawEnemy(e){
  if(!e.alive)return;
  const sx=e.x-cameraX;if(sx>W+40||sx<-40)return;
  if(e.stomped){ctx.fillStyle='#7a4200';ctx.fillRect(sx,e.y+e.h-10,e.w,10);ctx.fillStyle='#c8a200';ctx.fillRect(sx+2,e.y+e.h-8,e.w-4,6);return;}
  const fr=Math.floor(Date.now()/200)%2;
  ctx.fillStyle='#7a3800';ctx.beginPath();ctx.ellipse(sx+e.w/2,e.y+e.h/2+2,e.w/2,e.h/2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c86000';ctx.beginPath();ctx.arc(sx+e.w/2,e.y+10,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx+e.w/2-4,e.y+8,3,0,Math.PI*2);ctx.arc(sx+e.w/2+4,e.y+8,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(sx+e.w/2-3.5,e.y+8.5,1.5,0,Math.PI*2);ctx.arc(sx+e.w/2+4.5,e.y+8.5,1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5a2000';
  if(fr===0){ctx.beginPath();ctx.ellipse(sx+e.w/2-9,e.y+e.h-3,6,4,-0.3,0,Math.PI*2);ctx.ellipse(sx+e.w/2+9,e.y+e.h-3,6,4,0.3,0,Math.PI*2);ctx.fill();}
  else{ctx.beginPath();ctx.ellipse(sx+e.w/2-8,e.y+e.h-6,5,4,0.3,0,Math.PI*2);ctx.ellipse(sx+e.w/2+8,e.y+e.h-6,5,4,-0.3,0,Math.PI*2);ctx.fill();}
}

function drawPlayer(){
  if(!player)return;
  const sx=player.x-cameraX;
  const alpha=(player.invincible>0&&Math.floor(player.invincible/4)%2===0)?0.3:1;
  ctx.globalAlpha=player.dead?0.7:alpha;
  drawMario(sx,player.y,player.dead,bigMario,player.growing>0);
  ctx.globalAlpha=1;
}

function drawMario(sx,sy,dead,big,growing){
  const scale=big?1.5:1;
  const w=player.w, h=player.h;
  if(dead){
    ctx.fillStyle='#e83000';ctx.beginPath();ctx.arc(sx+w/2,sy+12,11,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c84b00';ctx.fillRect(sx+2,sy+16,w-4,8);return;
  }
  if(big){
    // 大きいマリオ
    const flash=growing&&Math.floor(Date.now()/80)%2===0;
    ctx.fillStyle=flash?'#fff':'#e83000';ctx.fillRect(sx+4,sy,w-8,20);
    ctx.fillStyle=flash?'#ffe0c0':'#ffd0a0';ctx.fillRect(sx+2,sy+12,w-4,14);
    ctx.fillStyle=flash?'#80c0ff':'#007ec8';ctx.fillRect(sx+2,sy+25,w-4,19);
    ctx.fillStyle=flash?'#fff':'#e83000';ctx.fillRect(sx,sy+36,12,8);ctx.fillRect(sx+w-12,sy+36,12,8);
    ctx.fillStyle='#5a2800';ctx.fillRect(sx+2,sy+4,w-4,7);
    ctx.fillStyle='#000';
    if(player.facingRight)ctx.fillRect(sx+20,sy+14,5,5);else ctx.fillRect(sx+7,sy+14,5,5);
    ctx.fillStyle='#ffd0a0';
    if(player.facingRight)ctx.fillRect(sx+w,sy+22,8,5);else ctx.fillRect(sx-8,sy+22,8,5);
  } else {
    ctx.fillStyle='#e83000';ctx.fillRect(sx+4,sy,w-8,14);
    ctx.fillStyle='#ffd0a0';ctx.fillRect(sx+2,sy+8,w-4,10);
    ctx.fillStyle='#007ec8';ctx.fillRect(sx+2,sy+17,w-4,13);
    ctx.fillStyle='#e83000';ctx.fillRect(sx,sy+25,10,5);ctx.fillRect(sx+w-10,sy+25,10,5);
    ctx.fillStyle='#5a2800';ctx.fillRect(sx+2,sy+3,w-4,5);
    ctx.fillStyle='#000';
    if(player.facingRight)ctx.fillRect(sx+14,sy+10,4,4);else ctx.fillRect(sx+6,sy+10,4,4);
    ctx.fillStyle='#ffd0a0';
    if(player.facingRight)ctx.fillRect(sx+w-2,sy+16,6,4);else ctx.fillRect(sx-4,sy+16,6,4);
  }
}

function drawParticles(){
  for(const p of particles){ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;ctx.fillRect(p.x-3,p.y-3,6,6);}
  ctx.globalAlpha=1;
  for(const c of coinAnims){
    ctx.globalAlpha=c.life/35;
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(c.x,c.y,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('+1',c.x,c.y);
  }
  ctx.globalAlpha=1;
}

function drawFlag(){
  const gx=(LEVEL_W-2)*TILE-cameraX,gy=H-6*TILE;
  ctx.fillStyle='#333';ctx.fillRect(gx,gy,4,6*TILE-TILE);
  ctx.fillStyle='#00cc44';ctx.beginPath();ctx.moveTo(gx+4,gy);ctx.lineTo(gx+36,gy+16);ctx.lineTo(gx+4,gy+32);ctx.closePath();ctx.fill();
}

function draw(){
  drawBackground();
  platforms.forEach(p=>drawTile(p.x,p.y,p.type));
  qblocks.forEach(q=>drawQBlock(q));
  drawFlag();
  drawMushroom();
  enemies.forEach(e=>drawEnemy(e));
  drawPlayer();
  drawParticles();
}

function loop(){
  if(!running)return;
  if(!player.dead){updatePlayer();updateMushroom();updateEnemies();updateParticles();}
  else{
    player.deadTimer--;player.y+=player.vy;player.vy+=GRAVITY*0.5;updateParticles();
    if(player.deadTimer<=0){lives--;updateHUD();if(lives<=0){showOverlay('GAME OVER','もう一度チャレンジ！');running=false;return;}bigMario=false;initGame();}
  }
  draw();requestAnimationFrame(loop);
}

function showOverlay(title,msg){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>${title}</h2><p style="white-space:pre-line;font-size:9px;line-height:2">${msg}</p><button id="startBtn" style="margin-top:18px;background:#e83000;color:#fff;border:3px solid #fff;font-family:'Press Start 2P',monospace;font-size:10px;padding:10px 20px;cursor:pointer;border-radius:4px;">▶ もう一度！</button>`;
  ov.style.display='flex';
  document.getElementById('startBtn').onclick=()=>{lives=3;bigMario=false;initGame();startGame();};
}
function startGame(){document.getElementById('overlay').style.display='none';running=true;requestAnimationFrame(loop);}
document.getElementById('startBtn').onclick=()=>{lives=3;bigMario=false;initGame();startGame();};
initGame();draw();
</script>
