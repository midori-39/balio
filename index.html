<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライトタップゲーム</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        font-family:Arial, sans-serif;
        background:linear-gradient(to bottom,#bdefff,#e6f9ff);
        touch-action:manipulation;
    }

    h1{
        position:absolute;
        top:10px;
        width:100%;
        text-align:center;
        color:#0088cc;
        font-size:clamp(24px,4vw,42px);
        margin:0;
        z-index:10;
    }

    #info{
        position:absolute;
        top:70px;
        left:50%;
        transform:translateX(-50%);
        background:white;
        padding:10px 22px;
        border-radius:18px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
        font-size:clamp(18px,2vw,28px);
        color:#006699;
        z-index:10;
    }

    #gameArea{
        position:relative;
        width:100vw;
        height:100vh;
        overflow:hidden;
    }

    .light{
        position:absolute;
        width:70px;
        height:70px;
        border-radius:50%;
        background:radial-gradient(circle, #ffffff 0%, #ffff99 40%, #66ddff 100%);
        box-shadow:
            0 0 15px #ffffff,
            0 0 30px #88eeff,
            0 0 50px #66ddff;
        animation: pulse 0.7s infinite alternate;
        cursor:pointer;
    }

    @keyframes pulse{
        from{
            transform:scale(1);
        }
        to{
            transform:scale(1.2);
        }
    }

    #startScreen,
    #endScreen{
        position:absolute;
        inset:0;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:rgba(180,240,255,0.92);
        z-index:20;
    }

    #endScreen{
        display:none;
    }

    button{
        margin-top:20px;
        padding:14px 28px;
        border:none;
        border-radius:18px;
        background:#44c8ff;
        color:white;
        font-size:22px;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.08);
        background:#22bbff;
    }

    #bestScore{
        margin-top:10px;
        font-size:24px;
        color:#0077aa;
    }

</style>
</head>

<body>

<h1>✨ ライトタップゲーム ✨</h1>

<div id="info">
    ⏱ 残り: <span id="time">20</span> 秒　
    ⭐ ポイント: <span id="score">0</span>
</div>

<div id="gameArea"></div>

<div id="startScreen">
    <h2>ランダムに光る玉をタップ！</h2>
    <p>1回成功で +10ポイント！</p>
    <p>後半ほど光がすぐ消える！</p>
    <button onclick="startGame()">ゲーム開始</button>
</div>

<div id="endScreen">
    <h2>🎉 ゲーム終了 🎉</h2>
    <div id="finalScore"></div>
    <div id="bestScore"></div>
    <button onclick="startGame()">もう一回</button>
</div>

<script>

const gameArea = document.getElementById("gameArea");
const timeDisplay = document.getElementById("time");
const scoreDisplay = document.getElementById("score");
const startScreen = document.getElementById("startScreen");
const endScreen = document.getElementById("endScreen");
const finalScore = document.getElementById("finalScore");
const bestScore = document.getElementById("bestScore");

let score = 0;
let timeLeft = 20;
let gameTimer;
let lightTimer;
let playing = false;

function startGame(){

    score = 0;
    timeLeft = 20;

    scoreDisplay.textContent = score;
    timeDisplay.textContent = timeLeft;

    startScreen.style.display = "none";
    endScreen.style.display = "none";

    clearLights();

    playing = true;

    spawnLight();

    gameTimer = setInterval(() => {

        timeLeft--;

        timeDisplay.textContent = timeLeft;

        if(timeLeft <= 0){
            endGame();
        }

    },1000);
}

function spawnLight(){

    if(!playing) return;

    clearLights();

    const light = document.createElement("div");
    light.className = "light";

    const size = 60 + Math.random() * 25;

    light.style.width = size + "px";
    light.style.height = size + "px";

    const maxX = window.innerWidth - size;
    const maxY = window.innerHeight - size;

    const x = Math.random() * maxX;
    const y = 120 + Math.random() * (maxY - 120);

    light.style.left = x + "px";
    light.style.top = y + "px";

    light.addEventListener("click", tapLight);
    light.addEventListener("touchstart", tapLight);

    gameArea.appendChild(light);

    // 時間が経つほど短くなる
    const visibleTime = Math.max(
        250,
        1200 - ((20 - timeLeft) * 45)
    );

    lightTimer = setTimeout(() => {

        if(light.parentNode){
            light.remove();
        }

        spawnLight();

    }, visibleTime);
}

function tapLight(e){

    e.preventDefault();

    if(!playing) return;

    score += 10;
    scoreDisplay.textContent = score;

    clearTimeout(lightTimer);

    this.remove();

    spawnLight();
}

function clearLights(){

    document.querySelectorAll(".light").forEach(light => {
        light.remove();
    });
}

function endGame(){

    playing = false;

    clearInterval(gameTimer);
    clearTimeout(lightTimer);

    clearLights();

    finalScore.innerHTML = `⭐ スコア: <b>${score}</b>`;

    let best = localStorage.getItem("lightTapBest") || 0;

    if(score > best){
        best = score;
        localStorage.setItem("lightTapBest", best);
    }

    bestScore.innerHTML = `🏆 ベストスコア: <b>${best}</b>`;

    endScreen.style.display = "flex";
}

</script>

</body>
</html>
